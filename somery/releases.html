<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Somery Releases — AI Dream Journal for iOS</title>
    <meta name="description" content="Somery release notes and changelog for the AI dream journal iOS app." />

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
<header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
        <a class="brand" href="./">
            <img src="assets/logo.png" alt="" class="brand-logo" />
            <span>Somery</span>
        </a>

        <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span>
        </button>

        <div class="nav-links">
            <a href="./#features">Features</a>
            <a href="./#privacy">Privacy</a>
            <a class="is-active" href="releases.html">Releases</a>
            <a href="./#pricing">Pricing</a>
            <a href="./#faq">FAQ</a>
        </div>
    </nav>
</header>

<main>
    <section id="releases" class="section releases-page">
        <div class="container">
            <div class="section-head reveal">
                <p class="eyebrow">Releases</p>
                <h1>Somery changelog.</h1>
                <p>Follow the latest Somery updates, grouped by minor release line.</p>
            </div>

            <div class="release-layout reveal">
                <aside class="release-version-sidebar" aria-label="Release versions">
                    <p class="release-sidebar-title">Versions</p>
                    <div class="release-version-list" data-release-versions>
                        <div class="release-state">
                            <p>Loading versions...</p>
                        </div>
                    </div>
                </aside>

                <div class="changelog-list" data-releases-list>
                    <div class="release-state">
                        <p>Loading Somery releases...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container footer-inner">
        <p>© 2026 Somery. All rights reserved.</p>
        <div>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms</a>
            <a href="mailto:support@somery.app">support@somery.app</a>
            <a href="#">GitHub</a>
        </div>
    </div>
</footer>

<script src="main.js"></script>
</body>
</html>
